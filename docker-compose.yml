version: "3.8"

services:
  mariadb:
    image: $DATABASE_IMAGE
    container_name: mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: $DATABASE_PASS
      MYSQL_DATABASE: $DATABASE_NAME
      MYSQL_USER: $DATABASE_USER
      MYSQL_PASSWORD: $DATABASE_PASS
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - maria_data:/var/lib/mysql
    networks:
      - cms_network

  php:
    depends_on:
      mariadb:
        condition: service_healthy
    build:
      context: ./php
      dockerfile: DockerFile
    container_name: php
    restart: always
    environment:
      - SCRIPT_NAME=/ping
      - SCRIPT_FILENAME=/ping
      - REQUEST_METHOD=GET
    healthcheck:
        test: [ "CMD", "cgi-fcgi", "-bind", "-connect", "127.0.0.1:9000" ]
        interval: 10s
        timeout: 5s
        retries: 3
        start_period: 5s
    volumes:
      - wp_files:/var/www/html
    networks:
      - cms_network

  wordpress:
    depends_on:
      php:
        condition: service_healthy
    image: $WORDPRESS_IMAGE
    container_name: wordpress
    restart: always
    environment:
      WORDPRESS_DB_HOST: mariadb:3306
      WORDPRESS_DB_USER: $DATABASE_USER
      WORDPRESS_DB_PASSWORD: $DATABASE_PASS
      WORDPRESS_DB_NAME: $DATABASE_NAME
   # healthcheck:
   #   test: [ "CMD", "curl", "-f", "http://localhost/wp-json/" ]
   #   interval: 20s
   #   timeout: 5s
   #   retries: 3
   #   start_period: 15s
    volumes:
      - wp_files:/var/www/html
      - ./mhw-theme:/var/www/html/wp-content/themes/mhw-theme
    networks:
      - cms_network

  webserver:
    #depends_on:
     # wordpress:
        #condition: service_healthy
    image: $NGINX_IMAGE
    container_name: nginx
    restart: always
    ports:
      - "$NGINX_PORT_SECOND:$NGINX_PORT"
    volumes:
      - wp_files:/var/www/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./mhw-theme:/var/www/html/wp-content/themes/mhw-theme
    healthcheck:
      test: ["CMD", "service", "nginx", "status"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - cms_network

volumes:
  maria_data:
  wp_files:

networks:
  cms_network:
    driver: bridge