server {
    listen 80;
    server_name NGINX_DOMAIN;

    root /var/www/html;
    index index.php;

    # Логирование (можно направить в stdout/stderr для `docker logs`)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Увеличение лимита загрузки файлов (важно для медиабиблиотеки плагинов/тем)
    client_max_body_size 64M;

    # Основной роутинг WordPress (обработка ЧПУ)
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # Проксирование PHP-запросов к контейнеру wordpress (PHP-FPM)
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;


        fastcgi_pass wordpress:WORDPRESS_PORT;
        fastcgi_index index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;


        fastcgi_hide_header X-Powered-By;
    }

    # Оптимизация отдачи статических активов (изображения, стили, скрипты)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires max;
        log_not_found off;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }

    # Запрет доступа к скрытым файлам (.htaccess, .git, .env и т.д.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Запрет выполнения PHP в папке загрузок (мера безопасности)
    location ~* /wp-content/uploads/.*\.php$ {
        deny all;
    }
}